name: Release

# Build the Windows NSIS installer and publish a GitHub Release whenever a
# version tag (v*) is pushed. Peers running CarbonSync auto-update from the
# release published here (src/daemon/updater.js checks releases/latest).
#
# To release: bump package.json on main, commit, then `git tag vX.Y.Z && git
# push origin vX.Y.Z`. Always tag a commit that is on main — never build/tag
# from a stale local tree (see CLAUDE.md "Source of truth & releases").
on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build installer
        run: npm run build -- --publish never

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: dist/*.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
