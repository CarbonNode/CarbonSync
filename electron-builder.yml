appId: com.carbonsync.app
productName: CarbonSync
forceCodeSigning: false
directories:
  output: dist
  buildResources: build
win:
  target:
    - portable
  icon: build/icon.ico
  signAndEditExecutable: false
files:
  - src/**/*
  - assets/**/*
  - package.json
extraMetadata:
  main: src/ui/main.js
