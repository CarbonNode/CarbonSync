appId: com.carbonsync.app
productName: CarbonSync
forceCodeSigning: false
directories:
  output: dist
  buildResources: build
win:
  target:
    - nsis
  icon: build/icon.ico
  signAndEditExecutable: false
nsis:
  oneClick: true
  runAfterFinish: true
  deleteAppDataOnUninstall: true
  shortcutName: CarbonSync
files:
  - src/**/*
  - assets/**/*
  - package.json
extraResources:
  - from: assets/icon.ico
    to: icon.ico
  - from: assets/icon.png
    to: icon.png
extraMetadata:
  main: src/ui/main.js
