<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CarbonSync</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Titlebar -->
  <div class="titlebar">
    <span class="titlebar-title">CarbonSync</span>
    <div class="titlebar-btns">
      <button class="tb-btn" id="btn-minimize">&#8211;</button>
      <button class="tb-btn tb-close" id="btn-close">&#10005;</button>
    </div>
  </div>

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <span class="badge green" id="status-badge"></span>
      <h1>CarbonSync</h1>
      <span class="header-sub" id="subtitle">Starting...</span>
    </div>
    <div class="header-right">
      <span id="tls-status"></span>
      <span class="header-stat">Port <strong id="port">—</strong></span>
      <span class="header-stat">Clients <strong id="clients">0</strong></span>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" data-tab="folders">Folders</button>
    <button class="tab" data-tab="activity">Activity</button>
    <button class="tab" data-tab="devices">Devices</button>
    <button class="tab" data-tab="settings">Settings</button>
  </div>

  <!-- Tab Content -->
  <div class="tab-content">

    <!-- Folders Tab -->
    <div class="tab-pane active" id="tab-folders">
      <div id="folders-list"></div>
      <div id="scan-progress" class="scan-progress"></div>
      <div class="tab-actions">
        <button class="btn green" id="btn-add">+ Add Folder</button>
      </div>
      <div class="drop-zone" id="drop-zone">
        <div class="drop-text">Drop a folder here to sync it</div>
      </div>
    </div>

    <!-- Activity Tab -->
    <div class="tab-pane" id="tab-activity">
      <div id="activity-feed"></div>
    </div>

    <!-- Devices Tab -->
    <div class="tab-pane" id="tab-devices">
      <div id="devices-list"></div>
      <div style="margin-top:12px; display:flex; gap:6px; align-items:center;">
        <input type="text" id="peer-ip" placeholder="IP address (e.g. 192.168.0.177)" style="flex:1; background:var(--bg); border:1px solid var(--border); border-radius:5px; padding:7px 10px; color:var(--text); font-size:13px; outline:none;">
        <input type="number" id="peer-port" placeholder="21547" value="21547" style="width:80px; background:var(--bg); border:1px solid var(--border); border-radius:5px; padding:7px 10px; color:var(--text); font-size:13px; outline:none;">
        <button class="btn" id="btn-add-peer">Add Peer</button>
      </div>
    </div>

    <!-- Settings Tab -->
    <div class="tab-pane" id="tab-settings">
      <div class="settings-grid">
        <div class="setting-group">
          <label>Scan Interval (minutes)</label>
          <input type="number" id="set-scan-interval" min="1" max="60" value="5">
        </div>
        <div class="setting-group">
          <label>Bandwidth Limit (MB/s, 0 = unlimited)</label>
          <input type="number" id="set-bandwidth" min="0" value="0">
        </div>
        <div class="setting-group">
          <label>Max Concurrent Transfers</label>
          <input type="number" id="set-concurrent" min="1" max="16" value="4">
        </div>
        <div class="setting-group">
          <label>Server Port</label>
          <input type="number" id="set-port" min="1024" max="65535" value="21547">
        </div>
      </div>
      <button class="btn" id="btn-save-settings" style="margin-top:12px;">Save Settings</button>

      <div class="setting-group" style="grid-column: span 2;">
        <label>Device Name</label>
        <div style="display:flex;gap:6px;">
          <input type="text" id="set-device-name" placeholder="My PC">
          <button class="btn sm" id="btn-save-name">Save</button>
        </div>
      </div>

      <div class="setting-section" style="grid-column: span 2;">
        <div class="setting-row">
          <span class="label">Current</span>
          <span class="value" id="current-version">—</span>
          <button class="btn sm" id="btn-check-update">Check for Updates</button>
        </div>
        <div id="update-status" style="font-size:12px;margin-top:6px;"></div>
      </div>

      <div class="setting-section">
        <h4>Identity</h4>
        <div class="setting-row">
          <span class="label">Fingerprint</span>
          <span class="value mono" id="fp-display">—</span>
          <button class="btn sm copy-btn" onclick="copyText('fp-display')">Copy</button>
        </div>
        <div class="setting-row">
          <span class="label">API Key</span>
          <span class="value mono truncate" id="key-display">—</span>
          <button class="btn sm copy-btn" onclick="copyText('key-display')">Copy</button>
        </div>
        <div class="setting-row">
          <span class="label">Device ID</span>
          <span class="value mono truncate" id="device-id">—</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Folder Settings Popup -->
  <div id="folder-settings-popup" class="popup-overlay hidden">
    <div class="popup-box">
      <div class="popup-header">
        <h3>Folder Settings — <span id="popup-folder-name"></span></h3>
        <button class="btn sm ghost" id="btn-close-popup">✕</button>
      </div>
      <div class="popup-body">
        <h4>Exclude Patterns</h4>
        <p class="popup-hint">Files/folders matching these patterns won't sync. Applies to all devices.</p>
        <div id="excludes-list"></div>
        <div class="exclude-add">
          <input type="text" id="new-exclude" placeholder="e.g. node_modules/ or *.log or .git/">
          <button class="btn sm" id="btn-add-exclude">Add</button>
        </div>
        <div class="popup-examples">
          <span class="example" onclick="document.getElementById('new-exclude').value='node_modules/'">node_modules/</span>
          <span class="example" onclick="document.getElementById('new-exclude').value='*.log'">*.log</span>
          <span class="example" onclick="document.getElementById('new-exclude').value='.git/'">`.git/`</span>
          <span class="example" onclick="document.getElementById('new-exclude').value='*.tmp'">*.tmp</span>
          <span class="example" onclick="document.getElementById('new-exclude').value='__pycache__/'">__pycache__/</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast container -->
  <div id="toast-container"></div>

  <script src="app.js"></script>
</body>
</html>
